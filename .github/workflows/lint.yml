name: Python Linting

# 1. This tells GitHub WHEN to run the script. 
# Here, it runs on every push and every pull request to the main branch.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. This defines the actual work to be done.
jobs:
  build:
    # 3. Spins up a fresh Ubuntu Linux virtual machine
    runs-on: ubuntu-latest

    steps:
    # 4. Downloads your repository's code onto the virtual machine
    - name: Check out code
      uses: actions/checkout@v4

    # 5. Installs Python on the virtual machine
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10" # You can change this to match your project

    # 6. Installs Flake8
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    # 7. Runs the linter against your code
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. Remove "--exit-zero" to strictly fail the build on style errors.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics